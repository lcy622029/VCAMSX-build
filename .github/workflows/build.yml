- name: Package as LSP module
  run: |
    cd app/build/outputs/apk/release
    mkdir -p META-INF/com/google/android
    echo "name=VCamSX" > META-INF/com/google/android/flash-script.sh
    echo "ui_print " 安装 VCamSX 虚拟摄像头模块"" >> META-INF/com/google/android/flash-script.sh
    zip -r VCamSX-LSP-module.zip app-release.apk META-INF

- name: Upload LSP module
  uses: actions/upload-artifact@v4
  with:
    name: VCamSX-LSP-module
    path: app/build/outputs/apk/release/VCamSX-LSP-module.zip
